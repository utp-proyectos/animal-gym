<!doctype html>
<html lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Animal Gym</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<header>
		<div class="header__menu">
			<nav class="navbar navbar-expand-lg bg-black d-flex fixed-top">
				<div class="container">

					<a class="navbar-brand text-white" href="#">
						<img src="images/logo.png" alt="Logo-Aniaml-Gym" class="img-fluid navbar-logo">
					</a>

					<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
						aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
						<span class="navbar-toggler-icon"></span>
					</button>

					<div class="collapse navbar-collapse justify-content-center" id="navbarNavAltMarkup">
						<div class="navbar-nav mx-auto text-center title-4">
							<a class="nav-link text-white title-4" href="#">INICIO</a>
							<a class="nav-link text-white title-4" href="#nosotros">NOSOTROS</a>
							<a class="nav-link text-white title-4" href="#membresias">MEMBRESiAS</a>
							<a class="nav-link text-white title-4" href="#clases">CLASES</a>
							<a class="nav-link text-white title-4" href="#contacto">CONTACTO</a>
						</div>
						<!-- Botón -->
						<div class="text-center">
							<a href="#" class="c-btn c-btn-primary text-white">LOGIN</a>
						</div>
					</div>
				</div>
			</nav>
		</div>

		<!-- Carrusel Moderno -->
		<div class="header__info">
			<div id="carouselGym" class="carousel slide vh-100" data-bs-ride="carousel" data-bs-interval="6000">

				<!-- Indicadores -->
				<div class="carousel-indicators">
					<button type="button" data-bs-target="#carouselGym" data-bs-slide-to="0" class="active"
						aria-current="true"></button>
					<button type="button" data-bs-target="#carouselGym" data-bs-slide-to="1"></button>
				</div>

				<!-- Slides -->
				<div class="carousel-inner h-100">

					<!-- Slide 1 -->
					<div class="carousel-item active h-100 position-relative">
						<img src="images/layout/header/principal.jpg" class="slide-image d-block w-100 h-100"
							alt="Gimnasio moderno">
						<!-- Gradiente Oscuro -->
						<div class="slide-gradient overlay position-absolute top-0 start-0 w-100 h-100">
						</div>

						<!-- Contenido -->
						<div
							class="carousel-caption d-flex flex-column justify-content-center align-items-start h-100 text-start px-5 animate__animated animate__fadeInUp">
							<h1 class="fw-bold mb-3 title-1">
								<span>Bienvenido a</span><br> Nuestro Gimnasio
							</h1>
							<p class="lead text-white-50 mb-4 fs-5">Transforma tu cuerpo, mejora tu vida. Vive la experiencia
								fitness.</p>
							<a href="#membresias" class="c-btn c-btn-primary shadow-lg">
								VER PLANES
							</a>
						</div>
					</div>

					<!-- Slide 2 -->
					<div class="carousel-item h-100 position-relative">
						<img src="images/layout/header/secondary.png" class="slide-image d-block w-100 h-100"
							alt="Entrenamiento personalizado">
						<div class="slide-gradient overlay position-absolute top-0 start-0 w-100 h-100">
						</div>

						<div
							class="carousel-caption d-flex flex-column justify-content-center align-items-start h-100 text-start px-5 animate__animated animate__fadeInUp">
							<h1 class="fw-bold mb-3 title-1">
								<span>Entrena con</span><br> los Mejores
							</h1>
							<p class="lead text-white-50 mb-4 fs-5">Planes flexibles, entrenadores expertos y resultados reales.
							</p>
							<a href="#clases" class="c-btn c-btn-primary shadow-lg">
								VER CLASES
							</a>
						</div>
					</div>
				</div>

				<!-- Controles -->
				<button class="carousel-control-prev" type="button" data-bs-target="#carouselGym" data-bs-slide="prev">
					<span class="carousel-control-prev-icon"></span>
					<span class="visually-hidden">Anterior</span>
				</button>
				<button class="carousel-control-next" type="button" data-bs-target="#carouselGym" data-bs-slide="next">
					<span class="carousel-control-next-icon"></span>
					<span class="visually-hidden">Siguiente</span>
				</button>
			</div>
		</div>
	</header>

	<button class="c-btn c-btn-primary">Ver inscripcion</button>

	<form>
		<div class="mb-3">
			<label for="exampleInputEmail1" class="form-label">Email address</label>
			<input type="email" class="c-form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="hoa">
		</div>
		<button type="submit" class="c-btn c-btn-primary">Submit</button>
	</form>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
